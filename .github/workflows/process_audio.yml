name: Process Audio Uploads
on:
  push:
    paths:
      - 'uploads/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  process-audio:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇ Checkout Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        
      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: 💾 Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 💾 Cache Hugging Face models
        uses: actions/cache@v3
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-models-v1
          restore-keys: |
            ${{ runner.os }}-hf-models-
          
      - name: ⚙️ Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          
      - name: 🎙️ Run AI Processor
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          python backend/process_batch.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
      - name: 🧹 Clean up and Commit Deletions
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add uploads/
          # Only commit if there are changes (files were deleted)
          if ! git diff --staged --quiet; then
            git commit -m "🔁 Clean up processed audio [skip ci]"
            git push
          else
            echo "No files to clean up."
          fi
